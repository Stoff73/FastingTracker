<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fasting Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f9fafb;
            overflow-x: hidden;
        }
        
        .app-container {
            max-width: 414px;
            margin: 0 auto;
            min-height: 100vh;
            background: #f9fafb;
            position: relative;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            padding-top: 48px;
        }
        
        .share-btn {
            width: 24px;
            height: 24px;
            color: #0ea5e9;
            cursor: pointer;
        }
        
        .main-content {
            padding: 16px 24px;
        }
        
        .progress-container {
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        }
        
        .progress-circle {
            position: relative;
            width: 320px;
            height: 320px;
        }
        
        .center-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .mood-emoji {
            font-size: 64px;
            margin-bottom: 8px;
        }
        
        .mood-text {
            color: #0ea5e9;
            font-size: 18px;
            font-weight: 500;
        }
        
        .stage-info {
            text-align: center;
            margin-top: 16px;
        }
        
        .stage-name {
            color: #059669;
            font-size: 14px;
            font-weight: 500;
        }
        
        .stage-desc {
            color: #6b7280;
            font-size: 12px;
        }
        
        .timer-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .timer-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
        }
        
        .timer-btn:hover {
            background: #f3f4f6;
        }
        
        .timer-hours {
            font-size: 32px;
            font-weight: 300;
        }
        
        .time-display {
            display: flex;
            justify-content: space-between;
            align-items: end;
            margin-bottom: 24px;
        }
        
        .time-section {
            text-align: center;
            flex: 1;
        }
        
        .time-label {
            font-size: 20px;
            font-weight: 600;
            color: #1f2937;
        }
        
        .time-value {
            color: #6b7280;
            margin: 4px 0;
        }
        
        .edit-btn {
            color: #0ea5e9;
            font-size: 12px;
            font-weight: 500;
            background: none;
            border: none;
            cursor: pointer;
            margin-top: 4px;
        }
        
        .elapsed-time {
            font-size: 48px;
            font-weight: 300;
            color: #1f2937;
        }
        
        .elapsed-label {
            color: #6b7280;
            font-size: 14px;
        }
        
        .mood-selector {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .mood-btn {
            font-size: 32px;
            padding: 8px;
            border-radius: 50%;
            border: none;
            background: none;
            cursor: pointer;
        }
        
        .mood-btn.active {
            background: #dbeafe;
        }
        
        .start-end-btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }
        
        .start-btn {
            background: #0ea5e9;
        }
        
        .end-btn {
            background: #ef4444;
        }
        
        .community-section {
            margin-top: 32px;
            text-align: center;
        }
        
        .community-number {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .community-text {
            color: #1f2937;
            font-weight: 500;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 414px;
            background: white;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: space-around;
            padding: 8px 0;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 8px;
            color: #9ca3af;
            text-decoration: none;
        }
        
        .nav-item.active {
            color: #0ea5e9;
        }
        
        .nav-icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
        }
        
        .nav-text {
            font-size: 12px;
        }
        
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
            background: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: white;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin: 16px;
            width: 100%;
            max-width: 384px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 4px;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            font-weight: 500;
            border: none;
            cursor: pointer;
        }
        
        .cancel-btn {
            background: #e5e7eb;
            color: #1f2937;
        }
        
        .save-btn {
            background: #0ea5e9;
            color: white;
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div style="width: 24px;"></div>
            <div style="width: 24px;"></div>
            <svg class="share-btn" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.367 2.684 3 3 0 00-5.367-2.684z"/>
            </svg>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Circular Progress -->
            <div class="progress-container">
                <div class="progress-circle">
                    <svg width="320" height="320" viewBox="0 0 320 320">
                        <!-- Background circle -->
                        <circle cx="160" cy="160" r="140" stroke="#e5e7eb" stroke-width="12" fill="transparent"/>
                        
                        <!-- Progress circle -->
                        <circle id="progress-circle" cx="160" cy="160" r="140" stroke="#0ea5e9" stroke-width="12" 
                                fill="transparent" stroke-dasharray="879.646" stroke-dashoffset="879.646" 
                                stroke-linecap="round" transform="rotate(-90 160 160)"
                                style="transition: all 0.5s ease-out"/>
                        
                        <!-- Stage icons will be added here dynamically -->
                        <g id="stage-icons"></g>
                    </svg>
                    
                    <!-- Center content -->
                    <div class="center-content">
                        <div id="mood-display" class="mood-emoji">😊</div>
                        <div class="mood-text">What's Your</div>
                        <div class="mood-text" style="margin-bottom: 16px;">Mood?</div>
                        <div id="stage-info" class="stage-info hidden">
                            <div id="stage-name" class="stage-name"></div>
                            <div id="stage-desc" class="stage-desc"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Timer Controls -->
            <div class="timer-controls">
                <button class="timer-btn" onclick="adjustTargetHours(-1)">−</button>
                <span id="target-hours" class="timer-hours">54 hr</span>
                <button class="timer-btn" onclick="adjustTargetHours(1)">+</button>
            </div>

            <!-- Time Display -->
            <div class="time-display">
                <div class="time-section">
                    <div class="time-label">Start</div>
                    <div id="start-date" class="time-value">Sep 23</div>
                    <div id="start-time" class="time-value">12:00 PM</div>
                    <button class="edit-btn" onclick="editStart()">EDIT</button>
                </div>
                
                <div class="time-section">
                    <div class="elapsed-label">Elapsed</div>
                    <div id="elapsed-time" class="elapsed-time">00:00:00</div>
                </div>
                
                <div class="time-section">
                    <div class="time-label">Target</div>
                    <div id="target-date" class="time-value">Sep 25</div>
                    <div id="target-time" class="time-value">6:00 PM</div>
                    <button class="edit-btn" onclick="editTarget()">EDIT</button>
                </div>
            </div>

            <!-- Mood Selector -->
            <div class="mood-selector">
                <button class="mood-btn active" onclick="setMood('😊')">😊</button>
                <button class="mood-btn" onclick="setMood('😌')">😌</button>
                <button class="mood-btn" onclick="setMood('💪')">💪</button>
                <button class="mood-btn" onclick="setMood('🤗')">🤗</button>
                <button class="mood-btn" onclick="setMood('😴')">😴</button>
                <button class="mood-btn" onclick="setMood('🔥')">🔥</button>
            </div>

            <!-- Start/End Button -->
            <button id="main-button" class="start-end-btn start-btn" onclick="toggleFast()">Start Fast</button>

            <!-- Community Section -->
            <div class="community-section">
                <div class="community-number">11,981</div>
                <div class="community-text">Fasting Now</div>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <div class="bottom-nav">
            <a href="#" class="nav-item active">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                </svg>
                <span class="nav-text">Home</span>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/>
                </svg>
                <span class="nav-text">Circles</span>
            </a>
            <a href="#" class="nav-item" style="position: relative;">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-5 5-5-5h5v-5a7.5 7.5 0 01-7.5-7.5H5a2.5 2.5 0 000 5h2.5v7.5z"/>
                </svg>
                <span class="nav-text">Notifications</span>
                <div class="notification-badge">4</div>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                </svg>
                <span class="nav-text">Learn</span>
            </a>
            <a href="#" class="nav-item">
                <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <span class="nav-text">Profile</span>
            </a>
        </div>
    </div>

    <!-- Edit Start Modal -->
    <div id="edit-start-modal" class="modal hidden">
        <div class="modal-content">
            <h3 class="modal-title">Edit Start Time</h3>
            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" id="temp-start-date" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Time</label>
                <input type="time" id="temp-start-time" class="form-input">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" onclick="closeEditStart()">Cancel</button>
                <button class="modal-btn save-btn" onclick="saveStartEdit()">Save</button>
            </div>
        </div>
    </div>

    <!-- Edit Target Modal -->
    <div id="edit-target-modal" class="modal hidden">
        <div class="modal-content">
            <h3 class="modal-title">Edit Target Time</h3>
            <div class="form-group">
                <label class="form-label">Date</label>
                <input type="date" id="temp-target-date" class="form-input">
            </div>
            <div class="form-group">
                <label class="form-label">Time</label>
                <input type="time" id="temp-target-time" class="form-input">
            </div>
            <div class="modal-buttons">
                <button class="modal-btn cancel-btn" onclick="closeEditTarget()">Cancel</button>
                <button class="modal-btn save-btn" onclick="saveTargetEdit()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // App state
        let isActive = false;
        let startTime = null;
        let targetHours = 54;
        let currentMood = '😊';
        let elapsedSeconds = 0;
        let currentStage = 0;
        let timer = null;

        // Fasting stages
        const fastingStages = [
            { name: 'Digestion', hours: 0, color: '#60A5FA', description: 'Body processing last meal' },
            { name: 'Fat Burning', hours: 12, color: '#F97316', description: 'Switching to fat for energy' },
            { name: 'Ketosis', hours: 18, color: '#EF4444', description: 'Producing ketones' },
            { name: 'Autophagy', hours: 24, color: '#10B981', description: 'Cellular repair begins' },
            { name: 'Deep Cleanse', hours: 48, color: '#8B5CF6', description: 'Enhanced mental clarity' }
        ];

        // Initialize app
        function init() {
            loadState();
            updateDisplay();
            if (isActive) {
                startTimer();
            }
        }

        // Load state from localStorage
        function loadState() {
            const saved = localStorage.getItem('fastingAppState');
            if (saved) {
                const state = JSON.parse(saved);
                isActive = state.isActive || false;
                startTime = state.startTime || null;
                targetHours = state.targetHours || 54;
                currentMood = state.mood || '😊';
                
                if (isActive && startTime) {
                    const now = Date.now();
                    elapsedSeconds = Math.floor((now - startTime) / 1000);
                }
            }
        }

        // Save state to localStorage
        function saveState() {
            const state = {
                isActive,
                startTime,
                targetHours,
                mood: currentMood
            };
            localStorage.setItem('fastingAppState', JSON.stringify(state));
        }

        // Start timer
        function startTimer() {
            timer = setInterval(() => {
                if (isActive && startTime) {
                    const now = Date.now();
                    elapsedSeconds = Math.floor((now - startTime) / 1000);
                    updateCurrentStage();
                    updateDisplay();
                }
            }, 1000);
        }

        // Stop timer
        function stopTimer() {
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
        }

        // Update current stage
        function updateCurrentStage() {
            const elapsedHours = elapsedSeconds / 3600;
            const stage = fastingStages.findLastIndex(stage => elapsedHours >= stage.hours);
            currentStage = Math.max(0, stage);
        }

        // Format time
        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            return `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Format date
        function formatDate(date) {
            return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        // Format time only
        function formatTimeOnly(date) {
            return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }

        // Update display
        function updateDisplay() {
            // Update mood
            document.getElementById('mood-display').textContent = currentMood;
            
            // Update target hours
            document.getElementById('target-hours').textContent = `${targetHours} hr`;
            
            // Update elapsed time
            document.getElementById('elapsed-time').textContent = formatTime(elapsedSeconds);
            
            // Update dates and times
            const startDate = startTime ? new Date(startTime) : new Date();
            const targetDate = startTime ? new Date(startTime + targetHours * 60 * 60 * 1000) : new Date(Date.now() + targetHours * 60 * 60 * 1000);
            
            document.getElementById('start-date').textContent = formatDate(startDate);
            document.getElementById('start-time').textContent = formatTimeOnly(startDate);
            document.getElementById('target-date').textContent = formatDate(targetDate);
            document.getElementById('target-time').textContent = formatTimeOnly(targetDate);
            
            // Update button
            const button = document.getElementById('main-button');
            if (isActive) {
                button.textContent = 'End Fast';
                button.className = 'start-end-btn end-btn';
            } else {
                button.textContent = 'Start Fast';
                button.className = 'start-end-btn start-btn';
            }
            
            // Update progress circle
            updateProgressCircle();
            
            // Update stage info
            updateStageInfo();
            
            // Update stage icons
            updateStageIcons();
        }

        // Update progress circle
        function updateProgressCircle() {
            const elapsedHours = elapsedSeconds / 3600;
            const progress = Math.min((elapsedHours / targetHours) * 100, 100);
            const circumference = 2 * Math.PI * 140;
            const offset = circumference - (progress / 100) * circumference;
            
            const circle = document.getElementById('progress-circle');
            circle.style.strokeDashoffset = offset;
            
            // Update color based on current stage
            if (fastingStages[currentStage]) {
                circle.setAttribute('stroke', fastingStages[currentStage].color);
            }
        }

        // Update stage info
        function updateStageInfo() {
            const stageInfo = document.getElementById('stage-info');
            if (isActive && fastingStages[currentStage]) {
                stageInfo.classList.remove('hidden');
                document.getElementById('stage-name').textContent = fastingStages[currentStage].name;
                document.getElementById('stage-desc').textContent = fastingStages[currentStage].description;
            } else {
                stageInfo.classList.add('hidden');
            }
        }

        // Update stage icons
        function updateStageIcons() {
            const iconsContainer = document.getElementById('stage-icons');
            iconsContainer.innerHTML = '';
            
            if (!isActive) return;
            
            const elapsedHours = elapsedSeconds / 3600;
            
            fastingStages.forEach((stage, index) => {
                if (elapsedHours >= stage.hours) {
                    const angle = (stage.hours / targetHours) * 360 - 90;
                    const x = 160 + 140 * Math.cos((angle * Math.PI) / 180);
                    const y = 160 + 140 * Math.sin((angle * Math.PI) / 180);
                    
                    // Create icon circle
                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', x);
                    circle.setAttribute('cy', y);
                    circle.setAttribute('r', 16);
                    circle.setAttribute('fill', 'white');
                    circle.setAttribute('stroke', stage.color);
                    circle.setAttribute('stroke-width', 3);
                    
                    // Create icon (simplified emoji representation)
                    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    text.setAttribute('x', x);
                    text.setAttribute('y', y + 4);
                    text.setAttribute('text-anchor', 'middle');
                    text.setAttribute('font-size', '16');
                    text.textContent = getStageEmoji(index);
                    
                    iconsContainer.appendChild(circle);
                    iconsContainer.appendChild(text);
                }
            });
        }

        // Get stage emoji
        function getStageEmoji(index) {
            const emojis = ['💧', '🔥', '⚡', '♻️', '🧠'];
            return emojis[index] || '●';
        }

        // Toggle fast
        function toggleFast() {
            if (isActive) {
                endFast();
            } else {
                startFast();
            }
        }

        // Start fast
        function startFast() {
            startTime = Date.now();
            isActive = true;
            elapsedSeconds = 0;
            currentStage = 0;
            saveState();
            startTimer();
            updateDisplay();
        }

        // End fast
        function endFast() {
            isActive = false;
            startTime = null;
            elapsedSeconds = 0;
            currentStage = 0;
            stopTimer();
            saveState();
            updateDisplay();
        }

        // Adjust target hours
        function adjustTargetHours(delta) {
            targetHours = Math.max(1, targetHours + delta);
            saveState();
            updateDisplay();
        }

        // Set mood
        function setMood(mood) {
            currentMood = mood;
            
            // Update mood button states
            document.querySelectorAll('.mood-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent === mood) {
                    btn.classList.add('active');
                }
            });
            
            saveState();
            updateDisplay();
        }

        // Edit functions
        function editStart() {
            const currentStart = startTime ? new Date(startTime) : new Date();
            document.getElementById('temp-start-date').value = currentStart.toISOString().split('T')[0];
            document.getElementById('temp-start-time').value = currentStart.toTimeString().slice(0, 5);
            document.getElementById('edit-start-modal').classList.remove('hidden');
        }

        function closeEditStart() {
            document.getElementById('edit-start-modal').classList.add('hidden');
        }

        function saveStartEdit() {
            const dateValue = document.getElementById('temp-start-date').value;
            const timeValue = document.getElementById('temp-start-time').value;
            const newStartTime = new Date(`${dateValue}T${timeValue}`).getTime();
            
            startTime = newStartTime;
            
            if (isActive) {
                const now = Date.now();
                elapsedSeconds = Math.floor((now - startTime) / 1000);
            }
            
            saveState();
            updateDisplay();
            closeEditStart();
        }

        function editTarget() {
            const currentTarget = startTime ? new Date(startTime + targetHours * 60 * 60 * 1000) : new Date(Date.now() + targetHours * 60 * 60 * 1000);
            document.getElementById('temp-target-date').value = currentTarget.toISOString().split('T')[0];
            document.getElementById('temp-target-time').value = currentTarget.toTimeString().slice(0, 5);
            document.getElementById('edit-target-modal').classList.remove('hidden');
        }

        function closeEditTarget() {
            document.getElementById('edit-target-modal').classList.add('hidden');
        }

        function saveTargetEdit() {
            const dateValue = document.getElementById('temp-target-date').value;
            const timeValue = document.getElementById('temp-target-time').value;
            const newTargetTime = new Date(`${dateValue}T${timeValue}`).getTime();
            const currentStart = startTime || Date.now();
            
            targetHours = Math.max(1, (newTargetTime - currentStart) / (1000 * 60 * 60));
            targetHours = Math.round(targetHours * 100) / 100;
            
            saveState();
            updateDisplay();
            closeEditTarget();
        }

        // Initialize app when page loads
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
